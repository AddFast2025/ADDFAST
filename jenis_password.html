<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Jenis Password</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
      text-align: center;
    }
    input {
      padding: 10px;
      font-size: 16px;
      width: 250px;
      margin: 5px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
    .notif {
      margin-top: 10px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>
<body>

<h2>Tambah Jenis Password</h2>

<div class="box">

  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>

  <p id="statusLogin"></p>

  <hr>

  <input type="text" id="jenis" placeholder="Jenis Password (Guru)"><br>
  <input type="text" id="kode" placeholder="Kode (GR)"><br>
  <input type="number" id="perkalian" placeholder="Angka Perkalian"><br>

  <button onclick="simpan()">Simpan</button>

  <p id="notif" class="notif"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpCCveqb2wqm8ju6vuKAHrWQBKiPEelp0",
  authDomain: "addfast-10f22.firebaseapp.com",
  projectId: "addfast-10f22",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// LOGIN
window.login = async function () {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    statusLogin.innerText = "✅ Login berhasil";
  } catch (e) {
    statusLogin.innerText = "❌ " + e.message;
  }
};

// SIMPAN DATA
window.simpan = async function () {
  if (!auth.currentUser) {
    alert("Login dulu!");
    return;
  }

  const jenis = document.getElementById("jenis").value;
  const kode = document.getElementById("kode").value.toUpperCase();
  const perkalian = parseInt(document.getElementById("perkalian").value);

  if (!jenis || !kode || !perkalian) {
    alert("Semua field harus diisi!");
    return;
  }

  try {
    await addDoc(collection(db, "jenisPassword"), {
      jenis: jenis,
      kode: kode,
      perkalian: perkalian,
      createdAt: new Date()
    });

    notif.innerText = "✅ Jenis password berhasil ditambahkan!";
    
    // reset input
    document.getElementById("jenis").value = "";
    document.getElementById("kode").value = "";
    document.getElementById("perkalian").value = "";

  } catch (error) {
    notif.innerText = "❌ Error: " + error.message;
  }
};
</script>

</body>
</html>
