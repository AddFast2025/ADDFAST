<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mapping Huruf</title>
</head>
<body>

<h2>Mapping Huruf (A=100)</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<p id="statusLogin"></p>

<textarea id="inputAbjad" placeholder="A=100&#10;B=101"></textarea><br>
<button onclick="simpanData()">Simpan</button>

<p id="status"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpCCveqb2wqm8ju6vuKAHrWQBKiPEelp0",
  authDomain: "addfast-10f22.firebaseapp.com",
  projectId: "addfast-10f22",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.login = async function () {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    statusLogin.innerText = "✅ Login berhasil";
  } catch (e) {
    statusLogin.innerText = "❌ " + e.message;
  }
};

window.simpanData = async function () {
  if (!auth.currentUser) return alert("Login dulu!");

  const lines = inputAbjad.value.split("\n");
  let data = {};

  lines.forEach(line => {
    const [huruf, nilai] = line.split("=");
    if (huruf && nilai) {
      data[huruf.trim().toUpperCase()] = parseInt(nilai.trim());
    }
  });

  await setDoc(doc(db, "mapping", "abjad"), data);
  status.innerText = "✅ Tersimpan di mapping/abjad";
};
</script>

</body>
</html>
