<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Admin</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
      text-align: center;
    }
    input {
      padding: 10px;
      font-size: 16px;
      width: 250px;
      margin: 5px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
    .notif {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>Input Admin</h2>

<div class="box">

  <!-- LOGIN -->
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>

  <p id="statusLogin"></p>

  <hr>

  <!-- INPUT ADMIN -->
  <input type="text" id="namaAdmin" placeholder="Nama Admin"><br>
  <input type="text" id="kodeAdmin" placeholder="Kode Admin"><br>

  <button onclick="simpan()">Simpan</button>

  <p id="notif" class="notif"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpCCveqb2wqm8ju6vuKAHrWQBKiPEelp0",
  authDomain: "addfast-10f22.firebaseapp.com",
  projectId: "addfast-10f22",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// LOGIN
window.login = async function () {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    statusLogin.innerText = "✅ Login berhasil";
  } catch (e) {
    statusLogin.innerText = "❌ " + e.message;
  }
};

// SIMPAN ADMIN
window.simpan = async function () {

  if (!auth.currentUser) {
    alert("Login dulu!");
    return;
  }

  const nama = document.getElementById("namaAdmin").value;
  const kode = document.getElementById("kodeAdmin").value.toUpperCase();

  if (!nama || !kode) {
    alert("Semua field harus diisi!");
    return;
  }

  try {
    await addDoc(collection(db, "admin"), {
      nama: nama,
      kode: kode,
      createdAt: new Date()
    });

    notif.innerText = "✅ Admin berhasil disimpan!";

    // reset
    document.getElementById("namaAdmin").value = "";
    document.getElementById("kodeAdmin").value = "";

  } catch (error) {
    notif.innerText = "❌ Error: " + error.message;
  }
};
</script>

</body>
</html>
