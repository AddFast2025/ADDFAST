<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Password Guru</title>
  <style>
  body {
    font-family: Arial;
    padding: 12px;
    background: #f5f5f5;
    margin: 0;
  }

  h2 {
    text-align: center;
    font-size: 20px;
  }

  #appBox {
    max-width:350px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  select, textarea, button {
    width: 350px;
    box-sizing: border-box;
    font-size: 16px;
    border-radius: 8px;
  }

  select {
    padding: 12px;
    margin-top: 10px;
  }

  textarea {
    padding: 12px;
    height: 160px;
    margin-top: 10px;
  }

  button {
    padding: 14px;
    margin-top: 12px;
    background: #4CAF50;
    color: white;
    border: none;
    font-weight: bold;
  }

  button:active {
    background: #3e8e41;
  }

  .hasil {
    margin-top: 12px;
    font-size: 16px;
  }

  #hasilList div {
    background: #f9f9f9;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
  }

  #adminInfo {
    font-size: 14px;
    margin-bottom: 10px;
    text-align: center;
  }
</style>
</head>
<body>

<h2>Generate Password Guru</h2>

<!-- LOGIN -->


<!-- APP -->
<div id="appBox" class="hidden">

  <p id="adminInfo">✅ Login</p>

  <select id="jenisSelect">
    <option value="">-- Pilih Jenis Password --</option>
  </select><br>

<textarea id="nama" placeholder="Masukkan banyak nama (1 baris 1 nama)" 
style="width:350px; height:150px; overflow-y:auto;"></textarea><br>

  <button onclick="generate()">Generate</button>

  <div class="hasil" id="hasil"></div>
  <div class="hasil" id="kode"></div>
  <div class="hasil" id="perkalian"></div>
  <div class="hasil" id="duaAngka"></div>
  <div class="hasil" id="hurufHasil"></div>
<div class="hasil" id="passwordFinal"></div>
<div class="hasil" id="hasilList" style="text-align:left;"></div>



</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpCCveqb2wqm8ju6vuKAHrWQBKiPEelp0",
  authDomain: "addfast-10f22.firebaseapp.com",
  projectId: "addfast-10f22",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let listJenis = [];
let namaAdminGlobal = "";


// AUTO LOGIN


// LOGIN
onAuthStateChanged(auth, async (user) => {

  if (!user) {

    // 🔐 POPUP LOGIN
    const emailInput = prompt("Masukkan Email:");
    const passwordInput = prompt("Masukkan Password:");

    if (!emailInput || !passwordInput) {
      alert("Login dibatalkan");
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, emailInput, passwordInput);
    } catch (e) {
      alert("❌ Login gagal: " + e.message);
      return;
    }

  } else {

    // 🔑 POPUP KODE ADMIN
  let kodeSimpan = localStorage.getItem("kodeAdmin");

let kodeInput = prompt(
  "Masukkan Kode Admin:",
  kodeSimpan ? kodeSimpan : ""

);


    if (!kodeInput) {
      alert("Akses ditolak");
      return;
    }

    // ambil data admin
    const querySnapshot = await getDocs(collection(db, "admin"));

    let ditemukan = false;
    let namaAdmin = "";

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      if (data.kode === kodeInput.toUpperCase()) {
        ditemukan = true;
        namaAdmin = data.nama;
localStorage.setItem("kodeAdmin", kodeInput.toUpperCase());

      }
    });

    if (!ditemukan) {
      alert("❌ Kode admin tidak ditemukan!");
localStorage.removeItem("kodeAdmin");

      return;
    }


namaAdminGlobal = namaAdmin;
document.getElementById("adminInfo").innerHTML = 
  `👤 Admin: <b>${namaAdmin}</b>`;

    document.getElementById("appBox").classList.remove("hidden");

    loadJenisPassword();
  }

});


// LOAD JENIS PASSWORD
async function loadJenisPassword() {
  const querySnapshot = await getDocs(collection(db, "jenisPassword"));
  const select = document.getElementById("jenisSelect");

  select.innerHTML = '<option value="">-- Pilih Jenis Password --</option>';
  listJenis = [];

  querySnapshot.forEach((docItem) => {
    const data = docItem.data();
    listJenis.push(data);

    const option = document.createElement("option");
    option.value = listJenis.length - 1;
    option.textContent = data.jenis;

    select.appendChild(option);
  });
}

// GENERATE
window.generate = async function () {

  const text = document.getElementById("nama").value;
  const selectedIndex = document.getElementById("jenisSelect").value;

  if (!text) return alert("Masukkan nama!");
  if (selectedIndex === "") return alert("Pilih jenis password!");

  const jenisData = listJenis[selectedIndex];

  const namaList = text.split("\n").map(n => n.trim()).filter(n => n);

  if (namaList.length === 0) return alert("Nama kosong!");

  // 🔥 POPUP KONFIRMASI
  let pesan = `Admin: ${namaAdminGlobal}\n`;
  pesan += `Jenis: ${jenisData.jenis}\n`;
  pesan += `Jumlah: ${namaList.length}\n`;
  namaList.forEach((n, i) => {
    pesan += `${i+1}. ${n}\n`;
  });
  let konfirmasi = confirm(pesan + "\Klik OK = Iya Copy & Simpan\nCancel = Batal");

  if (!konfirmasi) {
    document.getElementById("nama").value = "";
    return;
  }

  // 🔥 AMBIL MAPPING
  const docSnap = await getDoc(doc(db, "mapping", "abjad"));
  const mapping = docSnap.data();

  const angkaSnap = await getDoc(doc(db, "mapping", "angka"));
  const mappingAngka = angkaSnap.data();

  let hasilOutput = "";
  let hasilTextCopy = [];

  for (let nama of namaList) {

    let namaUpper = nama.toUpperCase();

    let total = 0;

    for (let huruf of namaUpper) {
      if (mapping[huruf]) {
        total += mapping[huruf];
      }
    }

    const hasilAkhir = total * jenisData.perkalian;

    let duaAngka = hasilAkhir.toString().substring(1,3);

    let hasilMod = (parseInt(duaAngka) % 24) + 1;

    let hurufHasil = mappingAngka[hasilMod] || "-";

    let duaDigitAkhir = hasilAkhir.toString().slice(-2);

    let passwordFinal = `${jenisData.kode}.${hurufHasil}${duaDigitAkhir}`;

    // tampilan
    hasilOutput += `
      <div style="margin-bottom:10px;">
        ${nama}<br>
        <b>${passwordFinal}</b>
      </div>
    `;

    // untuk copy
    hasilTextCopy.push(`${nama}\n${passwordFinal}`);
  }

  // tampilkan
  document.getElementById("hasilList").innerHTML = hasilOutput;

  // 🔥 COPY
  let textCopy = hasilTextCopy.join("\n\n");
  await navigator.clipboard.writeText(textCopy);

  alert("✅ Password berhasil di-copy!");

  // 🔥 SIMPAN KE FIRESTORE
  const { addDoc, collection } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");

  await addDoc(collection(db, "terbitPassword"), {
    admin: namaAdminGlobal,
    jenis: jenisData.jenis,
    kode: jenisData.kode,
    jumlah: namaList.length,
    data: hasilTextCopy,
    createdAt: new Date()
  });

  // kosongkan input
  document.getElementById("nama").value = "";
};

</script>

</body>
</html>
