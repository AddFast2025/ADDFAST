<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mapping Angka</title>
</head>
<body>

<h2>Mapping Angka (1=A)</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<p id="statusLogin"></p>

<textarea id="inputAngka" placeholder="1=A&#10;2=B"></textarea><br>
<button onclick="simpanData()">Simpan</button>

<p id="status"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpCCveqb2wqm8ju6vuKAHrWQBKiPEelp0",
  authDomain: "addfast-10f22.firebaseapp.com",
  projectId: "addfast-10f22",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.login = async function () {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    statusLogin.innerText = "✅ Login berhasil";
  } catch (e) {
    statusLogin.innerText = "❌ " + e.message;
  }
};

window.simpanData = async function () {
  if (!auth.currentUser) return alert("Login dulu!");

  const lines = inputAngka.value.split("\n");
  let data = {};

  lines.forEach(line => {
    const [angka, huruf] = line.split("=");
    if (angka && huruf) {
      data[angka.trim()] = huruf.trim().toUpperCase();
    }
  });

  await setDoc(doc(db, "mapping", "angka"), data);
  status.innerText = "✅ Tersimpan di mapping/angka";
};
</script>

</body>
</html>
